version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lyceum-attendance-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  bot:
    build: .
    container_name: lyceum-attendance-bot
    restart: always
    depends_on:
      - db
    env_file:
      - .env